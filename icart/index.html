<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iCart Support</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            line-height: 1.7;
            color: #2D2823;
            background: #F9F6F2;
            padding: 2rem 1rem;
        }
        .container {
            max-width: 720px;
            margin: 0 auto;
            background: #fff;
            padding: 2.5rem;
            border-radius: 16px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.06);
            text-align: center;
        }
        h1 {
            font-size: 2rem;
            margin-bottom: 0.25rem;
            color: #2D2823;
        }
        .tagline {
            color: #8C7055;
            font-size: 1.1rem;
            margin-bottom: 2rem;
        }
        nav { margin-top: 2rem; }
        nav a {
            display: block;
            padding: 20px;
            margin-bottom: 12px;
            background: #F9F6F2;
            border-radius: 12px;
            color: #2D2823;
            text-decoration: none;
            font-size: 1rem;
            font-weight: 500;
            text-align: left;
        }
        nav a:hover { background: #f0ebe4; }
        nav a span {
            color: #6b6560;
            font-weight: 400;
            font-size: 0.9rem;
            display: block;
            margin-top: 2px;
        }
        a {
            color: #8C7055;
            text-decoration: none;
        }
        a:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <div class="container">
        <h1>iCart</h1>
        <p class="tagline">Shared shopping lists for your household.</p>

        <nav>
            <a href="privacy-policy.html">
                Privacy Policy
                <span>How we handle your data</span>
            </a>
        </nav>
    </div>
</body>
</html>
