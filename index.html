<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BrainVault Apps</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            max-width: 600px;
            margin: 0 auto;
            padding: 48px 16px;
            line-height: 1.6;
            color: #1d1d1f;
            background: #fff;
        }
        h1 { font-size: 28px; margin-bottom: 8px; }
        .subtitle { color: #6e6e73; }
        .apps { margin-top: 32px; }
        .app {
            display: block;
            padding: 20px;
            margin-bottom: 12px;
            background: #f5f5f7;
            border-radius: 12px;
            color: #1d1d1f;
            text-decoration: none;
            font-size: 16px;
            font-weight: 500;
        }
        .app:hover { background: #e8e8ed; }
        .app span {
            color: #6e6e73;
            font-weight: 400;
            font-size: 14px;
            display: block;
            margin-top: 2px;
        }
        .contact {
            margin-top: 48px;
            font-size: 14px;
            color: #6e6e73;
        }
        .contact a { color: #6e6e73; }
    </style>
</head>
<body>
    <h1>BrainVault Apps</h1>
    <p class="subtitle">Support pages and privacy policies for our iOS apps.</p>

    <div class="apps">
        <a class="app" href="cellmonitor/">
            CellMonitor: Usage &amp; Speed
            <span>Support, features, FAQ, and privacy policy</span>
        </a>
        <a class="app" href="icart/">
            iCart
            <span>Support and privacy policy</span>
        </a>
    </div>

    <p class="contact">Contact: <a href="mailto:brainvault.mind@gmail.com">brainvault.mind@gmail.com</a></p>
</body>
</html>
